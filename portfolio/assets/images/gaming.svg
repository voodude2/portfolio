<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Dark Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070913"/>
      <stop offset="50%" stop-color="#0d1124"/>
      <stop offset="100%" stop-color="#05060d"/>
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyberpunk Gradients -->
    <linearGradient id="cyanPinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#FF0055"/>
    </linearGradient>

    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(15, 23, 42, 0.8)"/>
      <stop offset="100%" stop-color="rgba(8, 12, 24, 0.95)"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Cyberpunk Perspective Grid Grid lines -->
  <g opacity="0.15" stroke="#00F0FF" stroke-width="1">
    <path d="M 0,450 L 800,450 M 0,400 L 800,400 M 0,350 L 800,350 M 0,300 L 800,300 M 0,250 L 800,250" />
    <path d="M 100,250 L 0,450 M 250,250 L 150,450 M 400,250 L 400,450 M 550,250 L 650,450 M 700,250 L 800,450" />
  </g>

  <!-- Ambient Light Orbs -->
  <circle cx="150" cy="120" r="180" fill="#00F0FF" opacity="0.12" filter="url(#glowCyan)"/>
  <circle cx="650" cy="300" r="200" fill="#FF0055" opacity="0.12" filter="url(#glowPink)"/>

  <!-- HUD Decorative Header Bar -->
  <rect x="40" y="30" width="720" height="40" rx="6" fill="rgba(0, 240, 255, 0.05)" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="60" cy="50" r="6" fill="#00FF66" filter="url(#glowCyan)"/>
  <text x="76" y="55" font-family="'Orbitron', 'Rajdhani', sans-serif" font-size="12" font-weight="700" fill="#00F0FF" letter-spacing="2">SYSTEM STATUS: ONLINE • 64/70 RIGS AVAILABLE • 540HZ VIP PODS</text>

  <!-- Center Card Glass Interface -->
  <rect x="80" y="90" width="640" height="300" rx="16" fill="url(#cardBg)" stroke="url(#cyanPinkGrad)" stroke-width="2" filter="url(#glowCyan)"/>

  <!-- Gamepad Vector Illustration -->
  <g transform="translate(140, 160)">
    <!-- Controller Body -->
    <path d="M 40,20 Q 80,10 120,20 Q 160,30 180,70 L 190,120 Q 195,140 175,145 Q 155,150 140,125 L 120,95 Q 100,90 80,95 L 60,125 Q 45,150 25,145 Q 5,140 10,120 L 20,70 Q 40,30 40,20 Z" fill="#0D1326" stroke="#00F0FF" stroke-width="3" filter="url(#glowCyan)"/>
    <!-- D-Pad -->
    <rect x="45" y="50" width="10" height="30" rx="2" fill="#00F0FF"/>
    <rect x="35" y="60" width="30" height="10" rx="2" fill="#00F0FF"/>
    <!-- Action Buttons -->
    <circle cx="145" cy="50" r="6" fill="#FF0055" filter="url(#glowPink)"/>
    <circle cx="160" cy="65" r="6" fill="#00F0FF"/>
    <circle cx="130" cy="65" r="6" fill="#FFCC00"/>
    <circle cx="145" cy="80" r="6" fill="#00FF66"/>
    <!-- Center Branding -->
    <circle cx="100" cy="55" r="10" fill="none" stroke="#00F0FF" stroke-width="2"/>
    <path d="M 95,55 L 105,55 M 100,50 L 100,60" stroke="#FF0055" stroke-width="2"/>
  </g>

  <!-- Main Titles & Specs Text inside Card -->
  <g transform="translate(360, 140)">
    <!-- Category Tag -->
    <rect x="0" y="0" width="140" height="24" rx="12" fill="rgba(255, 0, 85, 0.2)" stroke="#FF0055" stroke-width="1"/>
    <text x="12" y="16" font-family="sans-serif" font-size="11" font-weight="700" fill="#FF0055" letter-spacing="1">ESPORTS ARENA 24/7</text>

    <!-- Main Title -->
    <text x="0" y="55" font-family="'Orbitron', sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" letter-spacing="1">
      CYBER<tspan fill="#00F0FF">PULSE</tspan>
    </text>
    <text x="0" y="80" font-family="'Rajdhani', sans-serif" font-size="16" font-weight="700" fill="#FF0055" letter-spacing="3">
      NEXT-GEN GAMING LOUNGE
    </text>

    <!-- Specs Grid Badges -->
    <g transform="translate(0, 105)">
      <!-- Badge 1 -->
      <rect x="0" y="0" width="140" height="40" rx="8" fill="rgba(0, 240, 255, 0.08)" stroke="#00F0FF" stroke-width="1"/>
      <text x="12" y="18" font-family="sans-serif" font-size="10" fill="#8E9BAE">MAX REFRESH</text>
      <text x="12" y="32" font-family="'Orbitron', sans-serif" font-size="13" font-weight="700" fill="#00F0FF">540Hz ROG OLED</text>

      <!-- Badge 2 -->
      <rect x="150" y="0" width="140" height="40" rx="8" fill="rgba(255, 0, 85, 0.08)" stroke="#FF0055" stroke-width="1"/>
      <text x="162" y="18" font-family="sans-serif" font-size="10" fill="#8E9BAE">TOP GPU RIG</text>
      <text x="162" y="32" font-family="'Orbitron', sans-serif" font-size="13" font-weight="700" fill="#FF0055">RTX 4090 OC 24G</text>
    </g>

    <!-- Bottom Features Line -->
    <text x="0" y="175" font-family="sans-serif" font-size="12" fill="#00FF66" font-weight="600">
      ✓ VIP Pods  ✓ Tournament Hub  ✓ Instant Station Booking
    </text>
  </g>

  <!-- Corner Tech Accents -->
  <path d="M 90,105 L 110,105 L 90,125 Z" fill="#00F0FF"/>
  <path d="M 710,375 L 690,375 L 710,355 Z" fill="#FF0055"/>
</svg>
