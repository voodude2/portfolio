<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="saasBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#070A10"/>
    </linearGradient>

    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>

    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(99, 102, 241, 0.4)"/>
      <stop offset="100%" stop-color="rgba(99, 102, 241, 0.0)"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glowIndigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="450" fill="url(#saasBg)"/>

  <!-- Ambient Light Orbs -->
  <circle cx="200" cy="100" r="220" fill="#6366F1" opacity="0.15" filter="url(#glowIndigo)"/>
  <circle cx="600" cy="350" r="200" fill="#06B6D4" opacity="0.12" filter="url(#glowCyan)"/>

  <!-- Subtle Network Nodes Line Grid -->
  <g opacity="0.1" stroke="#6366F1" stroke-width="1">
    <line x1="100" y1="50" x2="300" y2="150" />
    <line x1="300" y1="150" x2="500" y2="80" />
    <line x1="500" y1="80" x2="700" y2="200" />
    <line x1="200" y1="350" x2="450" y2="280" />
    <line x1="450" y1="280" x2="680" y2="380" />
    <circle cx="300" cy="150" r="4" fill="#6366F1"/>
    <circle cx="500" cy="80" r="4" fill="#06B6D4"/>
    <circle cx="450" cy="280" r="4" fill="#8B5CF6"/>
  </g>

  <!-- Dashboard Window -->
  <rect x="60" y="45" width="680" height="360" rx="14" fill="#1E293B" fill-opacity="0.7" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" filter="url(#glowIndigo)"/>

  <!-- Window Header Bar -->
  <path d="M 60,59 Q 60,45 74,45 L 726,45 Q 740,45 740,59 L 740,85 L 60,85 Z" fill="#0F172A" opacity="0.9"/>
  <!-- Window Control Buttons -->
  <circle cx="85" cy="65" r="5.5" fill="#EF4444"/>
  <circle cx="102" cy="65" r="5.5" fill="#F59E0B"/>
  <circle cx="119" cy="65" r="5.5" fill="#10B981"/>

  <!-- App Title inside Header -->
  <text x="145" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#94A3B8">NEXUS CLOUD OS • Enterprise SaaS Analytics Platform</text>
  <rect x="610" y="55" width="115" height="22" rx="11" fill="rgba(16, 185, 129, 0.15)" stroke="#10B981" stroke-width="1"/>
  <text x="625" y="70" font-family="sans-serif" font-size="10" font-weight="700" fill="#10B981">● 99.99% UPTIME</text>

  <!-- Sidebar Navigation -->
  <rect x="75" y="100" width="160" height="290" rx="8" fill="#0F172A" opacity="0.6"/>
  
  <!-- Sidebar Menu Items -->
  <g transform="translate(90, 115)">
    <rect x="0" y="0" width="130" height="32" rx="6" fill="url(#primaryGrad)"/>
    <text x="32" y="21" font-family="sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">📊 Dashboard</text>

    <text x="32" y="61" font-family="sans-serif" font-size="12" font-weight="600" fill="#64748B">☁️ Cloud Nodes</text>
    <text x="32" y="101" font-family="sans-serif" font-size="12" font-weight="600" fill="#64748B">💳 API Subscriptions</text>
    <text x="32" y="141" font-family="sans-serif" font-size="12" font-weight="600" fill="#64748B">👥 Team Roles</text>
    <text x="32" y="181" font-family="sans-serif" font-size="12" font-weight="600" fill="#64748B">⚡ Webhooks</text>
    <text x="32" y="221" font-family="sans-serif" font-size="12" font-weight="600" fill="#64748B">⚙️ Settings</text>
  </g>

  <!-- Main Content Area -->
  <g transform="translate(250, 100)">

    <!-- Metric Card 1 -->
    <rect x="0" y="0" width="145" height="75" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.08)"/>
    <text x="12" y="22" font-family="sans-serif" font-size="10" font-weight="600" fill="#94A3B8">ANNUAL REVENUE</text>
    <text x="12" y="46" font-family="sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">$2.48M</text>
    <text x="85" y="46" font-family="sans-serif" font-size="11" font-weight="700" fill="#10B981">+24.5%</text>

    <!-- Metric Card 2 -->
    <rect x="160" y="0" width="145" height="75" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.08)"/>
    <text x="172" y="22" font-family="sans-serif" font-size="10" font-weight="600" fill="#94A3B8">ACTIVE INSTANCES</text>
    <text x="172" y="46" font-family="sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">14,280</text>
    <text x="245" y="46" font-family="sans-serif" font-size="11" font-weight="700" fill="#3B82F6">Active</text>

    <!-- Metric Card 3 -->
    <rect x="320" y="0" width="155" height="75" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.08)"/>
    <text x="332" y="22" font-family="sans-serif" font-size="10" font-weight="600" fill="#94A3B8">MONTHLY REQUESTS</text>
    <text x="332" y="46" font-family="sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">1.84 B</text>
    <text x="415" y="46" font-family="sans-serif" font-size="11" font-weight="700" fill="#8B5CF6">99.8%</text>

    <!-- Vector Analytics Chart Box -->
    <rect x="0" y="90" width="475" height="195" rx="10" fill="#0F172A" stroke="rgba(99, 102, 241, 0.3)" stroke-width="1"/>
    
    <text x="16" y="115" font-family="sans-serif" font-size="13" font-weight="700" fill="#F8FAFC">Global Cloud Revenue & Traffic Growth</text>
    
    <!-- Chart Grid Lines -->
    <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
      <line x1="16" y1="140" x2="455" y2="140"/>
      <line x1="16" y1="180" x2="455" y2="180"/>
      <line x1="16" y1="220" x2="455" y2="220"/>
      <line x1="16" y1="260" x2="455" y2="260"/>
    </g>

    <!-- Chart Area Gradient Fill -->
    <polygon points="16,260 20,240 70,220 120,235 180,180 240,190 300,150 360,165 420,130 455,120 455,260" fill="url(#chartFill)"/>

    <!-- Chart Curve Line -->
    <path d="M 16,240 Q 70,210 120,235 T 240,190 T 360,165 T 455,120" fill="none" stroke="url(#primaryGrad)" stroke-width="3" filter="url(#glowIndigo)"/>

    <!-- Chart Points -->
    <circle cx="180" cy="180" r="5" fill="#6366F1" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="300" cy="150" r="5" fill="#8B5CF6" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="455" cy="120" r="6" fill="#D946EF" filter="url(#glowIndigo)"/>

  </g>
</svg>
